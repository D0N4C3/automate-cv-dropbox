{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-lg-8">
    <div class="card border-0 shadow-sm">
      <div class="card-header bg-white d-flex justify-content-between align-items-center">
        <strong>Create User</strong>
        <a href="{{ url_for('dashboard.index') }}" class="btn btn-sm btn-outline-secondary">Back to Dashboard</a>
      </div>
      <div class="card-body">
        <form method="post" action="{{ url_for('dashboard.create_user_post') }}" class="row g-3">
          <div class="col-md-6">
            <label class="form-label">First name</label>
            <input class="form-control" name="first_name" required />
          </div>
          <div class="col-md-6">
            <label class="form-label">Last name</label>
            <input class="form-control" name="last_name" required />
          </div>
          <div class="col-md-6">
            <label class="form-label">Email</label>
            <input class="form-control" type="email" name="email" required />
          </div>
          <div class="col-md-6">
            <label class="form-label">Password</label>
            <input class="form-control" type="password" name="password" required />
          </div>
          <div class="col-md-6">
            <label class="form-label">Job position</label>
            <select class="form-select" name="job_position" required>
              <option value="" selected disabled>Select position</option>
              {% for position in job_positions %}
                <option value="{{ position }}">{{ position }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-12 d-grid">
            <button class="btn btn-primary">Create User</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
