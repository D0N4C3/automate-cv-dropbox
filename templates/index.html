{% extends "base.html" %}
{% block content %}
<div class="card mb-4">
  <div class="card-body">
    <form class="row g-3" method="get">
      <div class="col-md-3">
        <input class="form-control" name="q" value="{{ filters.q }}" placeholder="Search name or email" />
      </div>
      <div class="col-md-3">
        <select class="form-select" name="role">
          <option value="">All roles</option>
          <option value="Battery Expert" {% if filters.role == 'Battery Expert' %}selected{% endif %}>Battery Expert</option>
          <option value="Sales &amp; Marketing" {% if filters.role == 'Sales & Marketing' %}selected{% endif %}>Sales &amp; Marketing</option>
        </select>
      </div>
      <div class="col-md-2"><input type="date" class="form-control" name="date_from" value="{{ filters.date_from }}" /></div>
      <div class="col-md-2"><input type="date" class="form-control" name="date_to" value="{{ filters.date_to }}" /></div>
      <div class="col-md-2 d-grid"><button class="btn btn-primary">Apply</button></div>
    </form>
  </div>
</div>

<div class="card">
  <div class="table-responsive">
    <table class="table table-striped table-hover mb-0">
      <thead class="table-dark">
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Role</th>
          <th>Date Applied</th>
          <th>Confidence</th>
          <th>CV</th>
        </tr>
      </thead>
      <tbody>
        {% for a in applicants %}
          <tr>
            <td>{{ a.full_name }}</td>
            <td>{{ a.email }}</td>
            <td>{{ a.role }}</td>
            <td>{{ a.date_applied.strftime('%Y-%m-%d %H:%M') }}</td>
            <td>{{ a.name_confidence }}</td>
            <td><a href="{{ a.dropbox_link }}" target="_blank" rel="noopener">Open CV</a></td>
          </tr>
        {% else %}
          <tr><td colspan="6" class="text-center text-muted py-4">No applicants found.</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
